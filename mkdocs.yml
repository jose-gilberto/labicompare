site_name: LabiCompare
site_description: Statistical comparison for Machine Learning models
site_url: https://jose-gilberto.github.io/labicompare/
repo_url: https://github.com/jose-gilberto/labicompare/

theme:
  name: material
  palette:
    primary: indigo
    accent: deep orange

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]

nav:
  - Getting Started: index.md
  - How to Use: usage.md
  - Next Steps: next.md
  - API:
    - Data: api/data.md
    - Stats: api/stats.md
    - Plots: api/plots.md

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js